databases:
  - name: aceroyal-db
    databaseName: aceroyal
    user: aceroyal
    plan: free

services:
  - type: web
    name: aceroyal-api
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate && npx nest build
    startCommand: npx prisma migrate deploy && npm run start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aceroyal-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: NODE_ENV
        value: production
